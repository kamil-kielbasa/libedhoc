name: CI / Linux

on: [push, pull_request]

jobs:
  build-gcc:
    name: GCC + Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Fetch submodules (with retry)
        uses: ./.github/actions/retry
        with:
          command: "git submodule sync --recursive && git submodule update --init --recursive --depth=1"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Build, test, and generate coverage
        # Use the custom allocator backend: its fault-injecting out-of-memory
        # tests are the only ones that exercise the EDHOC_ERROR_NOT_ENOUGH_MEMORY
        # branches, and it runs a superset of the stack/heap test suite, so it
        # yields the most representative coverage of the new code.
        run: bash scripts/ci.sh coverage --mem-backend custom

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build/coverage.info
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-clang:
    name: Clang
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Fetch submodules (with retry)
        uses: ./.github/actions/retry
        with:
          command: "git submodule sync --recursive && git submodule update --init --recursive --depth=1"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang ninja-build

      - name: Build and test
        run: |
          bash scripts/ci.sh build --clang
          bash scripts/ci.sh test

  mem-backends:
    name: Memory backend (${{ matrix.backend }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # Exercise every memory backend through the same build + test +
        # sanitizer pipeline: stack (default), heap and custom allocator.
        backend: [stack, heap, custom]
    steps:
      - uses: actions/checkout@v4

      - name: Fetch submodules (with retry)
        uses: ./.github/actions/retry
        with:
          command: "git submodule sync --recursive && git submodule update --init --recursive --depth=1"

      - name: Build and test
        run: |
          bash scripts/ci.sh build --gcc --mem-backend ${{ matrix.backend }}
          bash scripts/ci.sh test

      - name: Build and test (GCC + ASan + UBSan)
        run: bash scripts/ci.sh sanitizers asan-ubsan --mem-backend ${{ matrix.backend }}

  valgrind:
    name: Valgrind
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Fetch submodules (with retry)
        uses: ./.github/actions/retry
        with:
          command: "git submodule sync --recursive && git submodule update --init --recursive --depth=1"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Build and run valgrind
        run: |
          bash scripts/ci.sh build --gcc
          bash scripts/ci.sh valgrind

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Fetch submodules (with retry)
        uses: ./.github/actions/retry
        with:
          command: "git submodule sync --recursive && git submodule update --init --recursive --depth=1"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cppcheck clang-tidy clang ninja-build

      - name: Run cppcheck
        run: bash scripts/ci.sh cppcheck

      - name: Run clang-tidy
        run: bash scripts/ci.sh clang-tidy

  fuzz:
    name: Fuzz
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Fetch submodules (with retry)
        uses: ./.github/actions/retry
        with:
          command: "git submodule sync --recursive && git submodule update --init --recursive --depth=1"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang ninja-build

      - name: Build and fuzz (Clang + LibFuzzer, 60s per target)
        run: bash scripts/ci.sh fuzz 60
