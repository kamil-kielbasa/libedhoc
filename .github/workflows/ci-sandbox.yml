name: CI / Sandbox

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Fetch submodules (with retry)
      uses: ./.github/actions/retry
      with:
        command: "git submodule sync --recursive && git submodule update --init --recursive --depth=1"

    - name: Install dependencies (with retry)
      uses: ./.github/actions/retry
      with:
        command: "sudo apt-get update && sudo apt-get install -y cmake ninja-build"

    - name: Build sandbox
      run: |
        bash scripts/build_sandbox.sh
