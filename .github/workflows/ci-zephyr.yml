name: CI / Zephyr

on: [push, pull_request]

jobs:
  twister:
    name: Twister (native_sim samples)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zephyrproject-rtos/ci-base:v0.29.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: libedhoc

      - name: Initialize West workspace
        run: west init -l libedhoc

      - name: Update West projects (with retry)
        uses: ./libedhoc/.github/actions/retry
        with:
          command: "west update --narrow -o=--depth=1"

      - name: Install Python dependencies
        run: |
          pip install -r zephyr/scripts/requirements-base.txt

      # Build + run every sample.yaml under sample/ on native_sim. Twister checks
      # each sample's console harness (the benchmark emits its JSON report). The
      # benchmark runs in both libedhoc memory backends (stack + heap, the latter
      # via overlays/overlay-heap.conf) as separate scenarios.
      - name: Twister - build + run libedhoc samples (native_sim)
        env:
          ZEPHYR_TOOLCHAIN_VARIANT: host
        run: |
          ./zephyr/scripts/twister \
            --testsuite-root libedhoc/sample \
            --platform native_sim \
            --outdir twister-out \
            --inline-logs --verbose

      # The benchmark's real payload is the linked flash / RAM footprint and the
      # per-phase timing JSON - twister only asserts it ran, so re-run the
      # binaries it built and analyse them here.
      - name: Benchmark flash / RAM + timing analysis
        if: always()
        run: |
          report=twister-out/flash_report.txt
          : > "$report"
          for variant in stack heap; do
            exe=$(find twister-out -type f -name zephyr.exe \
                    -path "*benchmark*${variant}*" | head -n1)
            if [ -z "$exe" ]; then
              echo "WARNING: benchmark ${variant} binary not found" | tee -a "$report"
              continue
            fi
            echo "=== libedhoc flash footprint (${variant}) - from nm ===" | tee -a "$report"
            nm --print-size --size-sort --defined-only "$exe" \
              | grep -i edhoc \
              | awk '{printf "%6d  %s\n", strtonum("0x"$2), $4}' \
              | sort -rn | tee -a "$report"
            nm --print-size --size-sort --defined-only "$exe" \
              | grep -i edhoc \
              | awk -v v="$variant" '{sum += strtonum("0x"$2)} END {printf "libedhoc total (%s): %d bytes (%.1f KiB)\n", v, sum, sum/1024}' \
              | tee -a "$report"
            echo "--- timing (${variant}) ---" | tee -a "$report"
            "$exe" 2>/dev/null | sed -n '/^{/,/^}/p' \
              | tee "twister-out/benchmark_timing_${variant}.json"
          done

      - name: Upload Twister + benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-twister-native_sim
          path: |
            twister-out/twister.xml
            twister-out/flash_report.txt
            twister-out/benchmark_timing_*.json

