# Heap memory backend variant of the benchmark.
#
# Selects the libedhoc heap allocator (k_calloc / k_free) instead of the
# default stack (VLA) backend so CI exercises the heap allocation path on
# Zephyr. Apply with: -DEXTRA_CONF_FILE=overlays/overlay-heap.conf
CONFIG_LIBEDHOC_MEM_BACKEND_HEAP=y

# System heap pool that backs k_malloc. A single EDHOC handshake working set is
# a few KiB; 32 KiB leaves comfortable head-room for all phases.
CONFIG_HEAP_MEM_POOL_SIZE=32768
