# libedhoc
CONFIG_LIBEDHOC_ENABLE=y
CONFIG_LIBEDHOC_LOG_LEVEL_NONE=y

# mbedtls / PSA crypto
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=65536

# PSA crypto API (psa_crypto_init, psa_hash_compute, …)
CONFIG_MBEDTLS_PSA_CRYPTO_C=y

# Force-enable PK + OID via user config (avoids X.509 / PK_WRITE chain)
CONFIG_MBEDTLS_USER_CONFIG_ENABLE=y
CONFIG_MBEDTLS_USER_CONFIG_FILE="user-mbedtls.h"

# Legacy algorithms needed by cipher suite 2 (P-256, SHA-256, AES-CCM, HKDF)
CONFIG_MBEDTLS_ECP_C=y
CONFIG_MBEDTLS_ECP_DP_SECP256R1_ENABLED=y
CONFIG_MBEDTLS_ECDSA_C=y
CONFIG_MBEDTLS_ECDH_C=y
CONFIG_MBEDTLS_ECJPAKE_C=n

# PSA "want" flags — controls which PSA algorithms/key-types are compiled
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_IMPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_DERIVE=y
CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_PSA_WANT_ALG_ECDH=y
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_ALG_SHA_256=y
CONFIG_PSA_WANT_ALG_CCM=y
CONFIG_PSA_WANT_ALG_HKDF=y
CONFIG_PSA_WANT_ALG_HKDF_EXTRACT=y
CONFIG_PSA_WANT_ALG_HKDF_EXPAND=y
CONFIG_PSA_WANT_ALG_HMAC=y

# PSA key slots (each handshake uses ~10 slots; raise for multi-iteration)
CONFIG_MBEDTLS_PSA_KEY_SLOT_COUNT=128

# Stack for benchmark (VLA + message buffers)
CONFIG_MAIN_STACK_SIZE=16384
